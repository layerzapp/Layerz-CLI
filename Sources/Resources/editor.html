<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark">
  <title>Console Editor</title>

  <!-- CodeMirror 5 core -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/lib/codemirror.min.css">
  <!-- Themes -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/theme/dracula.min.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/theme/material-darker.min.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/theme/monokai.min.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/theme/nord.min.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/theme/solarized.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #282a36; }

    /* Editor fills the full viewport */
    .CodeMirror {
      height: 100vh;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.55;
    }
    .CodeMirror-scroll { height: 100vh; }

    /* Active-line subtle highlight */
    .CodeMirror-activeline-background { background: rgba(255,255,255,0.04) !important; }

    /* Fallback textarea when CodeMirror is unavailable (offline) */
    #fallback {
      display: none;
      width: 100%; height: 100vh;
      background: #282a36; color: #f8f8f2;
      font: 13px/1.55 'SF Mono', 'Menlo', monospace;
      border: none; padding: 10px; resize: none; outline: none;
    }
  </style>
</head>
<body>
  <textarea id="fallback" spellcheck="false"></textarea>

  <!-- CodeMirror core -->
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/lib/codemirror.min.js"
    onerror="activateFallback()"></script>

  <!-- Language modes -->
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/meta.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/javascript/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/python/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/swift/swift.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/xml/xml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/css/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/markdown/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/shell/shell.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/rust/rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/clike/clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/go/go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/yaml/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/toml/toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/mode/ruby/ruby.min.js"></script>

  <!-- Addons -->
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/addon/display/autorefresh.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/addon/selection/active-line.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.17/addon/search/searchcursor.min.js"></script>

  <script>
  'use strict';

  var cm = null;
  var isFallback = false;
  var debounceTimer = null;

  // ─── Notify Swift of content changes ────────────────────────────────────────
  function notifyChanged(value) {
    try { window.webkit.messageHandlers.contentChanged.postMessage(value); } catch (_) {}
  }

  function notifySave() {
    try { window.webkit.messageHandlers.saveRequested.postMessage(''); } catch (_) {}
  }

  // ─── Fallback (plain textarea, no CDN) ───────────────────────────────────────
  function activateFallback() {
    if (isFallback) return;
    isFallback = true;
    var ta = document.getElementById('fallback');
    ta.style.display = 'block';
    ta.addEventListener('input', function () { notifyChanged(ta.value); });
    ta.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        notifySave();
      }
      // Simple tab → 2 spaces
      if (e.key === 'Tab') {
        e.preventDefault();
        var s = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(end);
        ta.selectionStart = ta.selectionEnd = s + 2;
        notifyChanged(ta.value);
      }
    });
  }

  // ─── CodeMirror initialisation ───────────────────────────────────────────────
  window.addEventListener('load', function () {
    if (typeof CodeMirror === 'undefined') { activateFallback(); return; }

    var ta = document.getElementById('fallback');
    cm = CodeMirror.fromTextArea(ta, {
      lineNumbers:      true,
      theme:            'dracula',
      autoRefresh:      true,
      lineWrapping:     false,
      tabSize:          2,
      indentWithTabs:   false,
      styleActiveLine:  true,
      matchBrackets:    true,
      autoCloseBrackets: true,
      extraKeys: {
        'Cmd-S':  function () { notifySave(); },
        'Ctrl-S': function () { notifySave(); }
      }
    });

    // Debounced change notification
    cm.on('change', function (editor) {
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function () {
        notifyChanged(editor.getValue());
      }, 250);
    });
  });

  // ─── Public API called from Swift ────────────────────────────────────────────

  /**
   * Set editor content.
   * @param {string} content  – file text
   * @param {string} fileExt  – lowercase extension without dot, e.g. "swift"
   */
  window.setContent = function (content, fileExt) {
    content = content || '';
    if (isFallback) {
      var ta = document.getElementById('fallback');
      ta.value = content;
      return;
    }
    if (!cm) { return; }
    cm.setValue(content);
    cm.setOption('mode', extensionToMode(fileExt));
    cm.clearHistory();
    cm.refresh();
    // Scroll to top
    cm.scrollTo(0, 0);
    cm.setCursor({ line: 0, ch: 0 });
  };

  /** Get current editor content. */
  window.getContent = function () {
    if (isFallback) return document.getElementById('fallback').value;
    return cm ? cm.getValue() : '';
  };

  /** Apply editor settings from Swift. */
  window.applySettings = function (opts) {
    if (isFallback) {
      var ta = document.getElementById('fallback');
      if (opts.fontSize) ta.style.fontSize = opts.fontSize + 'px';
      return;
    }
    if (!cm) return;
    if (opts.fontSize) {
      document.querySelector('.CodeMirror').style.fontSize = opts.fontSize + 'px';
      cm.refresh();
    }
    if (opts.tabSize !== undefined) cm.setOption('tabSize', opts.tabSize);
    if (opts.lineWrapping !== undefined) cm.setOption('lineWrapping', opts.lineWrapping);
    if (opts.lineNumbers !== undefined) cm.setOption('lineNumbers', opts.lineNumbers);
    if (opts.theme) cm.setOption('theme', opts.theme);
  };

  // ─── Extension → CodeMirror mode mapping ─────────────────────────────────────
  function extensionToMode(ext) {
    if (!ext) return 'text/plain';
    var map = {
      // Web
      'js': 'javascript', 'mjs': 'javascript', 'cjs': 'javascript',
      'ts': 'text/typescript', 'tsx': 'text/typescript-jsx', 'jsx': 'text/jsx',
      'html': 'htmlmixed', 'htm': 'htmlmixed',
      'css': 'css', 'scss': 'text/x-scss', 'less': 'text/x-less',
      'xml': 'xml', 'svg': 'xml',
      // Data / Config
      'json': 'application/json',
      'yaml': 'yaml', 'yml': 'yaml',
      'toml': 'toml',
      // Scripting
      'py': 'python', 'pyw': 'python',
      'rb': 'ruby',
      'sh': 'shell', 'bash': 'shell', 'zsh': 'shell', 'fish': 'shell',
      // Systems
      'swift': 'swift',
      'rs': 'rust',
      'go': 'go',
      'c': 'text/x-csrc', 'h': 'text/x-csrc',
      'cpp': 'text/x-c++src', 'cc': 'text/x-c++src',
      'cxx': 'text/x-c++src', 'hpp': 'text/x-c++src',
      'java': 'text/x-java', 'kt': 'text/x-kotlin',
      'cs': 'text/x-csharp',
      // Markup
      'md': 'markdown', 'markdown': 'markdown',
      // Query
      'sql': 'text/x-sql',
      // Plain
      'txt': 'text/plain', 'log': 'text/plain',
    };
    return map[ext.toLowerCase()] || 'text/plain';
  }
  </script>
</body>
</html>
